const brands = ["Surf Excel","Ariel","Tide","Ghadi","Other"];
const colors = {
  "Surf Excel": { bg:"#185FA5", border:"#185FA5" },
  "Ariel":      { bg:"#993556", border:"#993556" },
  "Tide":       { bg:"#0F6E56", border:"#0F6E56" },
  "Ghadi":      { bg:"#BA7517", border:"#BA7517" },
  "Other":      { bg:"#5F5E5A", border:"#5F5E5A" }
};

function avg(arr){ return arr.reduce((s,v)=>s+v,0)/arr.length; }

function brandStats(brand){
  const rows = raw.filter(r=>r.brand===brand);
  return {
    n: rows.length,
    stain: avg(rows.map(r=>r.stain)),
    expensive: avg(rows.map(r=>r.expensive)),
    gentle: avg(rows.map(r=>r.gentle)),
    arielBetter: avg(rows.map(r=>r.arielBetter)),
    tideValue: avg(rows.map(r=>r.tideValue)),
    eco: avg(rows.map(r=>r.eco)),
    chemical: avg(rows.map(r=>r.chemical)),
    payEco: avg(rows.map(r=>r.payEco)),
  };
}

const stats = {};
brands.forEach(b=> stats[b]=brandStats(b));

const axisConfigs = [
  {
    x: { key:"stain", label:"← Low Cleaning Power       High Cleaning Power →" },
    y: { key:"expensive", label:"← Affordable       Expensive →", invert:false }
  },
  {
    x: { key:"gentle", label:"← Harsh on Fabric       Gentle on Fabric →" },
    y: { key:"eco", label:"← Low Eco-Friendliness       High Eco-Friendliness →" }
  },
  {
    x: { key:"tideValue", label:"← Low Value for Money       High Value for Money →" },
    y: { key:"payEco", label:"← Won't Pay Extra       Willing to Pay Premium →" }
  }
];

let currentAxis = 0;
let chartInst = null;

function setAxis(idx){
  [0,1,2].forEach(i=>{
    document.getElementById('axisBtn'+i).classList.toggle('active', i===idx);
  });
  currentAxis = idx;
  renderChart();
}

function renderChart(){
  const ax = axisConfigs[currentAxis];
  const datasets = brands.map(b=>{
    const s = stats[b];
    return {
      label: b,
      data:[{ x: s[ax.x.key], y: s[ax.y.key], r: Math.max(8, s.n * 1.2) }],
      backgroundColor: colors[b].bg + 'CC',
      borderColor: colors[b].border,
      borderWidth: 1.5,
    };
  });

  if(chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('mapChart'), {
    type: 'bubble',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 24, bottom: 24, left: 8, right: 8 } },
      scales: {
        x: {
          min: 1.5, max: 5.5,
          grid: { color: 'rgba(128,128,128,0.12)', lineWidth:0.8 },
          ticks: { display: false },
          title: { display: true, text: ax.x.label, color: '#888780', font:{ size:11 } }
        },
        y: {
          min: 1.5, max: 5.5,
          grid: { color: 'rgba(128,128,128,0.12)', lineWidth:0.8 },
          ticks: { display: false },
          title: { display: true, text: ax.y.label, color: '#888780', font:{ size:11 } }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const b = ctx.dataset.label;
              const s = stats[b];
              return [
                ` ${b}`,
                ` n = ${s.n} users`,
                ` ${ax.x.label.split('       ')[1].replace(' →','')}: ${s[ax.x.key].toFixed(2)}`,
                ` ${ax.y.label.split('       ')[1].replace(' →','')}: ${s[ax.y.key].toFixed(2)}`
              ];
            }
          },
          backgroundColor:'rgba(30,30,30,0.88)', titleColor:'#fff', bodyColor:'#ccc',
          padding:10, cornerRadius:6, displayColors:false
        }
      }
    },
    plugins:[{
      id:'brandLabels',
      afterDatasetsDraw(chart){
        const {ctx} = chart;
        chart.data.datasets.forEach((ds,i)=>{
          const meta = chart.getDatasetMeta(i);
          if(!meta.hidden && meta.data[0]){
            const pt = meta.data[0];
            ctx.save();
            ctx.fillStyle = colors[ds.label].border;
            ctx.font = '500 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(ds.label, pt.x, pt.y - pt.options.radius - 6);
            ctx.restore();
          }
        });
      }
    }]
  });
  renderStats();
}

function renderStats(){
  const el = document.getElementById('brandStats');
  el.innerHTML = brands.map(b=>{
    const s = stats[b];
    return `<div class="metric-card">
      <p class="metric-label" style="color:${colors[b].border}; font-weight:500;">${b}</p>
      <p class="metric-val">${s.n} <span style="font-size:13px;font-weight:400;color:var(--color-text-secondary)">users</span></p>
      <p style="font-size:12px;color:var(--color-text-secondary);margin:4px 0 0;">Cleaning: ${s.stain.toFixed(1)} &nbsp; Price: ${s.expensive.toFixed(1)}</p>
    </div>`;
  }).join('');
}

renderChart();
</script>
